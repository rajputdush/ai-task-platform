version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: taskforge-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-task-platform
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskforge-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    container_name: taskforge-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./worker
      target: production
    container_name: taskforge-worker
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: INFO
      POLL_INTERVAL_SECONDS: 5
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        REACT_APP_API_URL: /api
    container_name: taskforge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
