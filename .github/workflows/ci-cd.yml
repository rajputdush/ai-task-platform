name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/taskforge

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Lint Backend
        working-directory: backend
        run: |
          npm ci
          npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Worker
        working-directory: worker
        run: |
          pip install flake8
          flake8 worker.py --max-line-length=120

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

  # ── Build & Push ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          build-args: |
            REACT_APP_API_URL=/api
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update Infra Repo ────────────────────────────────────────────────────────
  update-infra:
    name: Update Infra Repository
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}  # e.g. YOUR_ORG/taskforge-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Determine overlay
        id: overlay
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "path=k8s/overlays/production" >> $GITHUB_OUTPUT
          else
            echo "path=k8s/overlays/staging" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags in kustomization
        working-directory: infra
        run: |
          TAG="${{ needs.build-push.outputs.image_tag }}"
          PREFIX="${{ env.IMAGE_PREFIX }}"
          OVERLAY="${{ steps.overlay.outputs.path }}"

          # Use kustomize to update image tags
          cd $OVERLAY
          kustomize edit set image \
            "DOCKER_HUB_USERNAME/taskforge-backend=${PREFIX}-backend:${TAG}" \
            "DOCKER_HUB_USERNAME/taskforge-worker=${PREFIX}-worker:${TAG}" \
            "DOCKER_HUB_USERNAME/taskforge-frontend=${PREFIX}-frontend:${TAG}"

      - name: Commit and push infra changes
        working-directory: infra
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || \
            git commit -m "chore: update image tags to ${{ needs.build-push.outputs.image_tag }} [skip ci]"
          git push
